spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: false

jwt:
  secret: test-secret-key-must-be-at-least-256-bits-long-for-unit-testing-purposes-only
  expiration-ms: 86400000
  refresh-expiration-ms: 604800000

rate-limit:
  max-tentativas: 5
  janela-minutos: 15
