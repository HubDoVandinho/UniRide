# ── Perfil LOCAL (H2 em memória) ──────────────────────────
spring:
  datasource:
    url: jdbc:h2:mem:uniride_users;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

logging:
  level:
    com.uniride: DEBUG
    org.hibernate.SQL: DEBUG
